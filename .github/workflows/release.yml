name: Release Mod

# Only build and publish when a version tag is pushed (e.g. v0.1.0.0).
# Normal pushes to main/master do nothing.
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # create GitHub Release and upload the mod zip

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          v="${REF_NAME#v}"
          echo "VERSION=${v}" >> "${GITHUB_OUTPUT}"
          echo "Building FS25_FieldToDoList ${v}"

      - name: Verify modDesc version matches tag
        env:
          TAG_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mod_version="$(grep -oP '(?<=<version>)[^<]+' modDesc.xml | head -n1)"
          if [[ "${mod_version}" != "${TAG_VERSION}" ]]; then
            echo "::error::modDesc.xml version (${mod_version}) does not match tag (${TAG_VERSION})."
            echo "Bump <version> in modDesc.xml before creating the release tag."
            exit 1
          fi
          echo "modDesc.xml version OK: ${mod_version}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick librsvg2-bin zip

      - name: Build mod zip
        env:
          SKIP_INSTALL: "1"
        run: bash ./build.sh

      - name: Verify zip output
        run: |
          zip_path=".build/FS25_FieldToDoList.zip"
          if [[ ! -f "${zip_path}" ]]; then
            echo "::error::Mod zip not found at ${zip_path}"
            exit 1
          fi

          echo "==> Zip contents"
          unzip -l "${zip_path}"

          forbidden="$(unzip -Z1 "${zip_path}" | grep -E '\.svg$' || true)"
          if [[ -n "${forbidden}" ]]; then
            echo "::error::Release zip must not contain SVG sources:"
            echo "${forbidden}"
            exit 1
          fi

          required=(
            modDesc.xml
            icon.dds
            gui/menuIcon.dds
            gui/icons/add.dds
            gui/icons/edit.dds
            gui/icons/done.dds
            gui/icons/delete.dds
            gui/FieldToDoMenuFrame.xml
            gui/FieldToDoMenuFrame.lua
          )
          missing=0
          for entry in "${required[@]}"; do
            if ! unzip -Z1 "${zip_path}" | grep -Fxq "${entry}"; then
              echo "::error::Missing required zip entry: ${entry}"
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          file_count="$(unzip -Z1 "${zip_path}" | wc -l)"
          echo "Release zip OK (${file_count} files, no dev-only assets)"
          ls -lh "${zip_path}"

      - name: Create GitHub Release and upload mod zip
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          zip_path=".build/FS25_FieldToDoList.zip"
          release_title="Field To-Do List v${VERSION}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release for ${TAG_NAME} exists -> updating asset"
            gh release upload "${TAG_NAME}" "${zip_path}" --clobber
            gh release edit "${TAG_NAME}" --title "${release_title}" --draft=false --prerelease=false
          else
            echo "Creating release for ${TAG_NAME}"
            gh release create "${TAG_NAME}" "${zip_path}" \
              --title "${release_title}" \
              --generate-notes \
              --latest
          fi
